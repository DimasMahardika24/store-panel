<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Dhikzx Cloud — Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        body { 
            background: #0f172a; 
            color: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            transform: translateY(-10px);
            border-color: #38bdf8;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 0 20px rgba(56, 189, 248, 0.2);
        }

        .btn-wa {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            transition: all 0.2s;
        }

        .btn-wa:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
        }

        .gradient-text {
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="pb-20">

    <header class="py-10 text-center">
        <div class="inline-block p-2 px-4 rounded-full bg-blue-500/10 border border-blue-500/20 mb-4">
            <span class="text-blue-400 text-xs font-bold tracking-widest uppercase">Premium Cloud Provider</span>
        </div>
        <h1 class="text-4xl md:text-5xl font-extrabold mb-2">Dhikzx <span class="gradient-text">Cloud</span></h1>
        <p class="text-slate-400 text-sm md:text-base">Panel Pterodactyl Murah, Cepat, dan Anti-Suspend.</p>
    </header>

    <main class="container mx-auto px-4">
        <div id="product-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <footer class="mt-20 text-center text-slate-500 text-sm">
        <p>&copy; 2026 DhikzxCloud. Built with ❤️ by Dimas.</p>
    </footer>

    <script>
        // DATA PRODUK (Edit di sini jika mau tambah/ubah)
        const products = [
            { id: 1, name: 'Standard Node', ram: '2GB', cpu: '100%', disk: '5GB', price: 'Rp 5.000' },
            { id: 2, name: 'Reguler Node', ram: '3GB', cpu: '150%', disk: '10GB', price: 'Rp 9.000' },
            { id: 3, name: 'Luxury Node', ram: '4GB', cpu: '150%', disk: '15GB', price: 'Rp 15.000' },
            { id: 4, name: 'Supreme Node', ram: '6GB', cpu: '200%', disk: '20GB', price: 'Rp 20.000' },
            { id: 5, name: 'Visionary Node', ram: '8GB', cpu: '250%', disk: '30GB', price: 'Rp 25.000' },
            { id: 6, name: 'Ultimate Node', ram: 'UNLI', cpu: '300%', disk: '50GB', price: 'Rp 40.000' },
        ];

        const waNumber = "6285810287828"; // Ganti dengan nomor WA kamu

        function renderProducts() {
            const container = document.getElementById('product-list');
            container.innerHTML = products.map(p => `
                <div class="glass-card rounded-3xl p-6 flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-xl font-bold text-white">${p.name}</h3>
                            <span class="bg-blue-500/20 text-blue-400 text-[10px] px-2 py-1 rounded-lg font-bold">READY</span>
                        </div>
                        
                        <div class="space-y-3 mb-6">
                            <div class="flex items-center text-slate-300">
                                <i class="fa-solid fa-microchip w-6 text-blue-400"></i>
                                <span class="text-sm">CPU: ${p.cpu}</span>
                            </div>
                            <div class="flex items-center text-slate-300">
                                <i class="fa-solid fa-memory w-6 text-blue-400"></i>
                                <span class="text-sm">RAM: ${p.ram}</span>
                            </div>
                            <div class="flex items-center text-slate-300">
                                <i class="fa-solid fa-hard-drive w-6 text-blue-400"></i>
                                <span class="text-sm">Disk: ${p.disk}</span>
                            </div>
                        </div>
                    </div>

                    <div>
                        <div class="text-2xl font-bold mb-4 text-white">${p.price}<span class="text-xs text-slate-500 font-normal"> /bulan</span></div>
                        <button onclick="buyViaWA('${p.name}', '${p.price}')" class="btn-wa w-full py-3 rounded-xl font-bold text-white flex items-center justify-center gap-2">
                            <i class="fa-brands fa-whatsapp text-lg"></i>
                            Beli Sekarang
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function buyViaWA(name, price) {
            const message = `Halo Dhikzx Cloud, saya ingin order:\n\n🚀 Produk: *${name}*\n💰 Harga: *${price}*\n\nMohon instruksi selanjutnya untuk pembayaran.`;
            const url = `https://wa.me/${waNumber}?text=${encodeURIComponent(message)}`;
            window.open(url, '_blank');
        }

        renderProducts();
    </script>
</body>
</html>
