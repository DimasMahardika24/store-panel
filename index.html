<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Dhikzx Cloud — Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg-deep: #0a0f1a;
            --accent: #38bdf8;
        }

        body { 
            background: var(--bg-deep); 
            color: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(56, 189, 248, 0.08) 0%, transparent 25%),
                radial-gradient(circle at 100% 100%, rgba(129, 140, 248, 0.08) 0%, transparent 25%);
            min-height: 100vh;
        }

        /* Animasi Modal */
        #welcome-modal {
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        .modal-hide {
            opacity: 0;
            transform: translate(-50%, -60%) scale(0.9) !important;
            pointer-events: none;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Style Progress Bar */
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            width: 100%;
            animation: progressRun 3s linear forwards;
        }

        @keyframes progressRun {
            from { width: 100%; }
            to { width: 0%; }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .gradient-text {
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-primary {
            background: linear-gradient(135deg, #38bdf8, #2563eb);
            transition: 0.3s;
        }
    </style>
</head>
<body class="pb-20">

    <div id="modal-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[99] transition-opacity duration-500 opacity-100"></div>
    
    <div id="welcome-modal" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[100] w-[90%] max-w-md glass-card p-8 rounded-[2rem] border border-white/10 shadow-2xl">
        <div class="text-center">
            <div class="w-16 h-16 bg-blue-500/20 rounded-2xl flex items-center justify-center text-3xl text-blue-400 mx-auto mb-4">
                <i class="fa-solid fa-shield-check"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2">Dhikzx Store Rules</h2>
            <p class="text-slate-400 text-sm leading-relaxed">
                1. No Reffund jika server sudah dibuat.<br>
                2. Dilarang melakukan DDoS dari panel.<br>
                3. Garansi Full selama masa aktif.<br>
                4. Order = Setuju dengan peraturan.
            </p>
            
            <div class="progress-container">
                <div class="progress-fill"></div>
            </div>
            <p class="text-[10px] text-slate-500 mt-2 uppercase tracking-widest">Menutup otomatis dalam 3 detik</p>
        </div>
    </div>

    <header class="pt-16 pb-12 text-center">
        <h1 class="text-4xl font-extrabold tracking-tight mb-2">DHIKZX <span class="gradient-text">STORE</span></h1>
        <p id="sub-title" class="text-slate-500 text-sm">Pilih kategori layanan untuk memulai</p>
    </header>

    <main class="container mx-auto px-6 max-w-5xl">
        <div id="navigation-area" class="mb-8 hidden">
            <button onclick="renderCategories()" class="flex items-center gap-2 text-slate-400 hover:text-white transition">
                <i class="fa-solid fa-arrow-left"></i> Kembali ke Kategori
            </button>
        </div>

        <div id="main-content" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            </div>
    </main>

    <script>
        const waNumber = "6285810287828";

        // Fungsi Tutup Modal Otomatis
        window.onload = () => {
            const modal = document.getElementById('welcome-modal');
            const overlay = document.getElementById('modal-overlay');
            
            setTimeout(() => {
                modal.classList.add('modal-hide');
                overlay.style.opacity = '0';
                setTimeout(() => overlay.remove(), 500); // Hapus overlay dari DOM
            }, 3000); // 3 Detik
        };

        const storeData = {
            "panel-bot": {
                title: "Panel Bot",
                icon: "fa-server",
                desc: "Hosting bot 24/7 anti suspend.",
                products: [
                    { name: "Starter Panel", spec: "RAM 2GB | CPU 100%", price: "Rp 5.000" },
                    { name: "Medium Panel", spec: "RAM 4GB | CPU 150%", price: "Rp 10.000" },
                    { name: "Extreme Panel", spec: "RAM UNLIMITED | CPU 200%", price: "Rp 25.000" }
                ]
            },
            "script-bot": {
                title: "Script Bot",
                icon: "fa-code",
                desc: "Script siap pakai, no error.",
                products: [
                    { name: "Script Pushkontak", spec: "Fitur v15 Terbaru", price: "Rp 15.000" },
                    { name: "Script Bot RPG", spec: "Full Game & Fitur", price: "Rp 30.000" }
                ]
            },
            "sewa-bot": {
                title: "Sewa Bot",
                icon: "fa-robot",
                desc: "Bot masuk ke grup kamu.",
                products: [
                    { name: "Sewa 1 Bulan", spec: "1 Grup + Fitur Premium", price: "Rp 10.000" },
                    { name: "Sewa Permanen", spec: "Unlimited Time", price: "Rp 35.000" }
                ]
            },
            "jasa-fix": {
                title: "Jasa Fix Bot",
                icon: "fa-tools",
                desc: "Benerin error script bot kamu.",
                products: [
                    { name: "Fix Error Ringan", spec: "Pengerjaan 10-30 Menit", price: "Rp 5.000" },
                    { name: "Fix Error Logic/Struktur", spec: "Pengerjaan 1-3 Jam", price: "Rp 15.000" }
                ]
            }
        };

        const mainContent = document.getElementById('main-content');
        const navArea = document.getElementById('navigation-area');
        const subTitle = document.getElementById('sub-title');

        function renderCategories() {
            navArea.classList.add('hidden');
            subTitle.innerText = "Pilih kategori layanan untuk memulai";
            mainContent.className = "grid grid-cols-1 md:grid-cols-2 gap-6 fade-in";
            mainContent.innerHTML = Object.keys(storeData).map(key => `
                <div onclick="renderProducts('${key}')" class="glass-card rounded-3xl p-8 cursor-pointer flex items-center gap-6">
                    <div class="category-icon w-16 h-16 rounded-2xl flex items-center justify-center text-2xl text-blue-400 bg-blue-500/10 border border-blue-500/20">
                        <i class="fa-solid ${storeData[key].icon}"></i>
                    </div>
                    <div>
                        <h3 class="text-xl font-bold text-white">${storeData[key].title}</h3>
                        <p class="text-slate-400 text-sm">${storeData[key].desc}</p>
                    </div>
                </div>
            `).join('');
        }

        function renderProducts(categoryKey) {
            const category = storeData[categoryKey];
            navArea.classList.remove('hidden');
            subTitle.innerText = `Menampilkan produk untuk ${category.title}`;
            mainContent.className = "grid grid-cols-1 md:grid-cols-3 gap-6 fade-in";
            mainContent.innerHTML = category.products.map(p => `
                <div class="glass-card rounded-3xl p-6 flex flex-col justify-between border-t-4 border-t-blue-500/30">
                    <div>
                        <div class="text-[10px] font-bold text-blue-400 uppercase tracking-widest mb-2">${category.title}</div>
                        <h3 class="text-lg font-bold text-white mb-2">${p.name}</h3>
                        <p class="text-slate-400 text-xs mb-6 pb-4 border-b border-white/5">${p.spec}</p>
                    </div>
                    <div>
                        <div class="text-xl font-bold text-white mb-4">${p.price}</div>
                        <button onclick="buyViaWA('${p.name}', '${category.title}', '${p.price}')" class="btn-primary w-full py-3 rounded-xl font-bold text-white text-xs flex items-center justify-center gap-2">
                            <i class="fa-brands fa-whatsapp text-lg"></i>
                            Beli Sekarang
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function buyViaWA(name, cat, price) {
            const msg = `Halo Dhikzx Store, saya mau order:\n\n📦 Kategori: *${cat}*\n🚀 Produk: *${name}*\n💰 Harga: *${price}*\n\nMohon instruksi pembayarannya.`;
            window.open(`https://wa.me/${waNumber}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        renderCategories();
    </script>
</body>
</html>
